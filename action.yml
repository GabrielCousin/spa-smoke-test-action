name: "spa-smoke-test-action"
description: "Smoke-test single-page apps with a headless browser"
branding:
  icon: "anchor"
  color: "orange"
inputs:
  target-url:
    description: "URL to smoke-test"
    required: true
  target-selector:
    description: "Selector to query"
    required: true
  request-url:
    description: "Request to spy"
  wait-on-start:
    description: "Waiting duration before asserting"
runs:
  using: "node24"
  main: "dist/index.js"
