name: "spa-smoke-test-action"
description: "Use this action to run very basic smoke tests for your single-page apps with Puppeteer"
branding:
  icon: "anchor"
  color: "orange"
inputs:
  target-url:
    description: "URL to smoke-test"
    required: true
  target-selector:
    description: "Selector to query"
    required: true
  request-url:
    description: "Request to spy"
  wait-on-start:
    description: "Waiting duration before asserting"
  engine:
    description: "Browser engine to use (lightpanda, puppeteer, playwright-chrome, playwright-firefox)"
    required: false
    default: "lightpanda"
runs:
  using: "node24"
  main: "dist/index.js"
