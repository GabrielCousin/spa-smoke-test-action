name: "spa-smoke-test-action"
description: "Use this action to run very basic smoke tests for your single-page apps with Puppeteer"
branding:
  icon: "anchor"
  color: "orange"
inputs:
  target-url:
    description: "URL to smoke-test"
    required: true
  target-selector:
    description: "Selector to query"
    required: true
  request-url:
    description: "Request to spy"
  http-auth-username:
    description: "Username for HTTP Basic Auth"
  http-auth-password:
    description: "Password for HTTP Basic Auth"
  wait-on-start:
    description: "Waiting duration before asserting"
  engine:
    description: "Browser engine to use (lightpanda, playwright, puppeteer)"
    required: false
    default: "lightpanda"
  browser:
    description: "Browser name for Playwright engine (chromium, firefox, webkit)"
    required: false
    default: "chromium"
runs:
  using: "node24"
  main: "dist/index.js"
