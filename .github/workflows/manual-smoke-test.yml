name: Manual SPA smoke test

on:
  workflow_dispatch:
    inputs:
      target-url:
        description: "URL to smoke-test"
        required: true
        type: string
      target-selector:
        description: "Selector to query"
        required: true
        type: string
      request-url:
        description: "Request to spy (optional)"
        required: false
        type: string
      wait-on-start:
        description: "Waiting duration before asserting (ms, optional)"
        required: false
        default: "0"
        type: string
      engine:
        description: "Browser engine to use (lightpanda, puppeteer, playwright-chrome, playwright-firefox)"
        required: false
        default: "lightpanda"
        type: string

permissions:
  contents: read

jobs:
  run-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Run SPA smoke test
        uses: GabrielCousin/spa-smoke-test-action@latest
        with:
          target-url: ${{ inputs.target-url }}
          target-selector: ${{ inputs.target-selector }}
          request-url: ${{ inputs.request-url }}
          wait-on-start: ${{ inputs.wait-on-start }}
          engine: ${{ inputs.engine }}
